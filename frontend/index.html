<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpsPilot Tasks</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --border-color: #ddd;
            --primary-color: #007bff;
            --completed-color: #6c757d;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --border-color: #444;
            --primary-color: #4da3ff;
            --completed-color: #888;
        }

        body {
            max-width: 720px;
            margin: 2rem auto;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        h1 {
            margin-bottom: 1.5rem;
            color: var(--primary-color);
        }

        .form-container {
            display: flex;
            gap: .5rem;
            margin: 1rem 0 2rem;
        }

        input[type="text"] {
            flex: 1;
            padding: .75rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        button {
            padding: .75rem 1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            margin: 1rem 0;
            font-weight: 500;
            color: var(--primary-color);
        }

        .error {
            color: #dc3545;
        }

        ul {
            list-style: none;
            padding: 0;
            display: grid;
            gap: .75rem;
        }

        li {
            display: flex;
            align-items: center;
            gap: .75rem;
            border: 1px solid var(--border-color);
            padding: .75rem;
            border-radius: 8px;
            background-color: var(--bg-color);
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .task-text {
            flex: 1;
            font-size: 1rem;
            transition: text-decoration 0.3s;
        }

        .task-text.completed {
            text-decoration: line-through;
            color: var(--completed-color);
            opacity: 0.7;
        }

        .delete-btn {
            background-color: #dc3545;
            padding: .5rem .75rem;
            font-size: .875rem;
            margin-left: auto;
        }

        .delete-btn:hover {
            opacity: 0.9;
        }

        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: .5rem .75rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: .875rem;
        }

        @media (max-width: 600px) {
            .form-container {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle">Toggle Dark Mode</button>
    
    <main>
        <h1>OpsPilot Tasks</h1>

        <form id="taskForm" class="form-container">
            <input 
                type="text" 
                id="newTitle" 
                placeholder="New task title"
                autocomplete="off"
            />
            <button type="submit" id="addBtn">Add</button>
        </form>

        <div id="status" class="status" style="display: none;"></div>

        <ul id="taskList"></ul>
    </main>

    <script>
        // Task management logic
        let tasks = [];
        let isLoading = false;

        // DOM elements
        const taskForm = document.getElementById('taskForm');
        const newTitleInput = document.getElementById('newTitle');
        const addBtn = document.getElementById('addBtn');
        const statusEl = document.getElementById('status');
        const taskListEl = document.getElementById('taskList');
        const themeToggle = document.getElementById('themeToggle');

        // Theme toggle functionality
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        });

        // Load theme from localStorage
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }

        // API endpoints
        const API_BASE = '/api/tasks';

        // Utility functions
        function showStatus(message, isError = false) {
            statusEl.textContent = message;
            statusEl.className = isError ? 'status error' : 'status';
            statusEl.style.display = 'block';
            
            setTimeout(() => {
                statusEl.style.display = 'none';
            }, 3000);
        }

        function setLoading(loading) {
            isLoading = loading;
            addBtn.disabled = loading;
            addBtn.textContent = loading ? 'Adding...' : 'Add';
        }

        function formatDate(date) {
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
        }

        // Render tasks
        function renderTasks() {
            taskListEl.innerHTML = '';
            
            if (tasks.length === 0) {
                const emptyMsg = document.createElement('div');
                emptyMsg.className = 'status';
                emptyMsg.textContent = 'No tasks yet. Add your first task above!';
                taskListEl.appendChild(emptyMsg);
                return;
            }

            tasks.forEach(task => {
                const li = document.createElement('li');
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = task.completed;
                checkbox.addEventListener('change', () => toggleComplete(task));

                const span = document.createElement('span');
                span.className = task.completed ? 'task-text completed' : 'task-text';
                span.textContent = task.title;

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.textContent = 'Delete';
                deleteBtn.addEventListener('click', () => deleteTask(task));

                li.appendChild(checkbox);
                li.appendChild(span);
                li.appendChild(deleteBtn);
                
                taskListEl.appendChild(li);
            });
        }

        // API calls
        async function fetchTasks() {
            try {
                setLoading(true);
                showStatus('Loading tasks...');
                
                const response = await fetch(API_BASE);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                tasks = Array.isArray(data) ? data : [];
                renderTasks();
                showStatus('Tasks loaded successfully');
            } catch (error) {
                console.error('Error fetching tasks:', error);
                showStatus('Failed to load tasks: ' + error.message, true);
                // Fallback to empty array
                tasks = [];
                renderTasks();
            } finally {
                setLoading(false);
            }
        }

        async function createTask(title) {
            try {
                setLoading(true);
                
                const response = await fetch(API_BASE, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ title })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const newTask = await response.json();
                tasks.push(newTask);
                renderTasks();
                newTitleInput.value = '';
                showStatus('Task added successfully');
            } catch (error) {
                console.error('Error creating task:', error);
                showStatus('Failed to add task: ' + error.message, true);
            } finally {
                setLoading(false);
            }
        }

        async function toggleComplete(task) {
            try {
                const response = await fetch(`${API_BASE}/${task.id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ completed: !task.completed })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const updatedTask = await response.json();
                
                // Update local task
                const index = tasks.findIndex(t => t.id === task.id);
                if (index !== -1) {
                    tasks[index] = updatedTask;
                    renderTasks();
                }
                
                showStatus('Task updated successfully');
            } catch (error) {
                console.error('Error updating task:', error);
                showStatus('Failed to update task: ' + error.message, true);
            }
        }

        async function deleteTask(task) {
            if (!confirm('Are you sure you want to delete this task?')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/${task.id}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                tasks = tasks.filter(t => t.id !== task.id);
                renderTasks();
                showStatus('Task deleted successfully');
            } catch (error) {
                console.error('Error deleting task:', error);
                showStatus('Failed to delete task: ' + error.message, true);
            }
        }

        // Event listeners
        taskForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const title = newTitleInput.value.trim();
            if (title && !isLoading) {
                createTask(title);
            }
        });

        // Initialize
        fetchTasks();
    </script>
</body>
</html>
